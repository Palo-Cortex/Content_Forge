services:
  dev:
    build: .
    container_name: content_forge_dev
    working_dir: /app
    environment:
      REPO_DIR: /workspace/secops-framework
      INGEST_DIR: /workspace/ingest
      OUTPUT_DIR: /workspace/output
      TARGET_PACK: soc-optimization-unified
      STAGING_PACK: soc-optimization-unified_ingest

      DEMISTO_SDK_CONTENT_PATH: /workspace/secops-framework
      DEMISTO_SDK_IGNORE_CONTENT_WARNING: "true"
    volumes:
      - ./app:/app/app
      - ./workspace:/workspace
    stdin_open: true
    tty: true